<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box1 {
            height: 500px;
            width: 400px;
            background-color: antiquewhite;
            margin: auto;
            padding-top: 50px;
        }

        #box2 {
            height: 400px;
            width: 300px;
            background-color: aqua;
            margin: auto;
            padding-top: 50px;
        }

        #box3 {
            height: 300px;
            width: 200px;
            background-color: blueviolet;
            margin: auto;
            padding-top: 50px;
        }
    </style>
</head>

<body>

    <div id="box1">
        <div id="box2">
            <div id="box3">

            </div>
        </div>
    </div>
    <script>
        document.getElementById("box1").addEventListener("click", display1)
        function display1(event) {
            if (event.target.id == "box1") {
                console.log("you click on grandfather")
            }
            else if (event.target.id == "box2") {
                console.log("you click on father")
            }
            else{
                console.log("you click on child")
            }
        }






    </script>
</body>

</html>
