<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Superb Weather — Single File</title>
<style>
  /* --- Reset --- */
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; }

  /* --- Body / Layout --- */
  body {
    font-family: Inter, "Segoe UI", Roboto, system-ui, -apple-system, "Helvetica Neue", Arial;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    background: linear-gradient(135deg,#e6f0ff,#f7fbff);
    transition: background 0.8s ease;
    min-height:100vh;
  }

  /* Container */
  .card {
    width: 100%;
    max-width: 520px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), #ffffff);
    border-radius:18px;
    box-shadow: 0 18px 50px rgba(16,24,40,0.15);
    padding:26px;
    overflow:hidden;
  }

  .top {
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:14px;
  }

  .logo {
    width:56px;
    height:56px;
    border-radius:12px;
    display:grid;
    place-items:center;
    background: linear-gradient(135deg,#1e3c72,#2a7bd4);
    color: #fff;
    font-weight:700;
    font-size:18px;
    box-shadow: 0 8px 18px rgba(42,123,212,0.25);
  }

  h1 {
    font-size:20px;
    color:#10325b;
    letter-spacing:0.2px;
  }
  p.sub {
    font-size:13px;
    color:#5b6d82;
    margin-top:4px;
  }

  /* Search row */
  .search {
    display:flex;
    gap:10px;
    margin-top:14px;
  }

  .search input {
    flex:1;
    padding:12px 14px;
    border-radius:999px;
    border:1px solid rgba(16,50,91,0.08);
    outline:none;
    font-size:15px;
    transition: box-shadow .2s, border-color .2s, transform .08s;
    box-shadow: 0 6px 18px rgba(16,50,91,0.03);
  }
  .search input:focus {
    border-color:#1e3c72;
    box-shadow: 0 10px 30px rgba(30,60,114,0.08);
    transform: translateY(-2px);
  }

  .search button {
    padding:11px 16px;
    border-radius:999px;
    border:none;
    background: linear-gradient(180deg,#1e3c72,#1451a7);
    color:white;
    cursor:pointer;
    font-weight:600;
    box-shadow: 0 8px 20px rgba(30,60,114,0.18);
    transition: transform .12s, box-shadow .12s, opacity .12s;
  }
  .search button:hover { transform: translateY(-3px); }
  .search button:active { transform: translateY(0); }

  /* Result area */
  .result {
    margin-top:18px;
    display:flex;
    gap:18px;
    align-items:center;
  }

  .weather-icon {
    min-width:110px;
    min-height:110px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(180deg, rgba(16,50,91,0.06), rgba(16,50,91,0.02));
    box-shadow: inset 0 -6px 18px rgba(255,255,255,0.6);
  }

  .weather-icon img { width:86px; height:86px; }

  .details {
    flex:1;
  }

  .temp {
    font-size:34px;
    font-weight:700;
    color:#0f3357;
  }
  .desc {
    margin-top:6px;
    text-transform:capitalize;
    color:#405a76;
    font-weight:600;
  }

  .meta {
    margin-top:12px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .meta .m {
    background: rgba(16,50,91,0.04);
    padding:8px 12px;
    border-radius:12px;
    font-size:13px;
    color:#23415f;
    display:flex;
    gap:8px;
    align-items:center;
  }

  /* Footer small */
  .info {
    margin-top:16px;
    font-size:13px;
    color:#62788f;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .error {
    margin-top:12px;
    color:#b41c1c;
    font-weight:600;
  }

  /* Backgrounds by weather */
  .bg-clear { background: linear-gradient(135deg,#a8edea,#fed6e3); }
  .bg-clouds { background: linear-gradient(135deg,#dfe9f3,#ffffff); }
  .bg-rain { background: linear-gradient(135deg,#cfd9df,#e2ebf0); }
  .bg-drizzle { background: linear-gradient(135deg,#cfe0ff,#e6f7ff); }
  .bg-thunderstorm { background: linear-gradient(135deg,#2b5876,#4e4376); color:#fff; }
  .bg-snow { background: linear-gradient(135deg,#e6f0ff,#f0fcff); }
  .bg-mist { background: linear-gradient(135deg,#eef2f3,#f5f7fa); }

  /* Responsive */
  @media (max-width:520px){
    .result { gap:12px; }
    .weather-icon { min-width:86px; min-height:86px; }
    .weather-icon img { width:70px; height:70px; }
    .temp { font-size:28px; }
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="top">
      <div class="logo">W</div>
      <div>
        <h1>Superb Weather</h1>
        <p class="sub">Type a city name & hit <strong>Get Weather</strong> (or press Enter)</p>
      </div>
    </div>

    <div class="search">
      <input id="cityInput" placeholder="e.g. Bengaluru, London, New York" aria-label="City name">
      <button id="getBtn" title="Get weather">Get Weather</button>
    </div>

    <div id="weatherArea">
      <!-- Filled by JS -->
    </div>

    <div id="err" class="error" style="display:none"></div>

    <div class="info" style="margin-top:12px;">
      <div>Data source: OpenWeatherMap</div>
      <div id="timeStamp" style="opacity:0.8;font-size:13px;"></div>
    </div>
  </div>

<script>
/*
  Single-file Weather App (uses OpenWeatherMap)
  - Replace YOUR_API_KEY_HERE with your OpenWeather API key.
  - Uses fetch (Promises), no async/await to keep compatibility.
*/

const apiKey = "YOUR_API_KEY_HERE"; // <-- put your API key here
const input = document.getElementById('cityInput');
const btn = document.getElementById('getBtn');
const weatherArea = document.getElementById('weatherArea');
const errDiv = document.getElementById('err');
const card = document.getElementById('card');
const timeStamp = document.getElementById('timeStamp');

function setError(msg){
  errDiv.style.display = 'block';
  errDiv.textContent = msg;
}
function clearError(){
  errDiv.style.display = 'none';
  errDiv.textContent = '';
}
function setBackgroundByMain(main){
  // remove any previous bg-* classes on body
  const body = document.body;
  body.classList.remove('bg-clear','bg-clouds','bg-rain','bg-drizzle','bg-thunderstorm','bg-snow','bg-mist');
  const m = (main || '').toLowerCase();
  if (m.includes('clear')) body.classList.add('bg-clear');
  else if (m.includes('cloud')) body.classList.add('bg-clouds');
  else if (m.includes('rain')) body.classList.add('bg-rain');
  else if (m.includes('drizzle')) body.classList.add('bg-drizzle');
  else if (m.includes('thunder')) body.classList.add('bg-thunderstorm');
  else if (m.includes('snow')) body.classList.add('bg-snow');
  else body.classList.add('bg-mist');
}

function renderWeather(data){
  if(!data || !data.main) {
    weatherArea.innerHTML = '';
    return;
  }

  const name = data.name + (data.sys && data.sys.country ? ', ' + data.sys.country : '');
  const temp = Math.round(data.main.temp);
  const feels = Math.round(data.main.feels_like);
  const humidity = data.main.humidity;
  const wind = data.wind && data.wind.speed ? data.wind.speed : '-';
  const desc = data.weather && data.weather[0] ? data.weather[0].description : '';
  const main = data.weather && data.weather[0] ? data.weather[0].main : '';
  const icon = data.weather && data.weather[0] ? data.weather[0].icon : '01d';
  const iconUrl = `https://openweathermap.org/img/wn/${icon}@2x.png`;
  const now = new Date();
  timeStamp.textContent = now.toLocaleString();

  setBackgroundByMain(main);

  weatherArea.innerHTML = `
    <div class="result">
      <div class="weather-icon" aria-hidden="true">
        <img src="${iconUrl}" alt="${desc}">
      </div>

      <div class="details" role="region" aria-live="polite">
        <div style="display:flex;align-items:baseline;gap:10px;">
          <div class="temp">${temp}°C</div>
          <div style="font-size:14px;color:#586f89">Feels ${feels}°C</div>
        </div>
        <div style="margin-top:6px;font-size:15px;font-weight:700;color:#29486a">${name}</div>
        <div class="desc">${desc}</div>

        <div class="meta">
          <div class="m">🌊 Humidity: ${humidity}%</div>
          <div class="m">💨 Wind: ${wind} m/s</div>
          <div class="m">🔁 Pressure: ${data.main.pressure} hPa</div>
        </div>
      </div>
    </div>
  `;
}

function getWeatherByCity(city){
  if(!city){
    setError('Please enter a city name.');
    return;
  }
  clearError();
  weatherArea.innerHTML = '<div style="margin-top:14px;color:#2b4b72">Loading…</div>';

  const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`;

  fetch(url)
    .then(resp => {
      if (!resp.ok) {
        if (resp.status === 404) throw new Error('City not found — check spelling.');
        throw new Error('Unable to fetch weather. (HTTP ' + resp.status + ')');
      }
      return resp.json();
    })
    .then(data => {
      renderWeather(data);
    })
    .catch(err => {
      weatherArea.innerHTML = '';
      setError(err.message || 'Something went wrong.');
      // reset background class if error
      document.body.classList.remove('bg-clear','bg-clouds','bg-rain','bg-drizzle','bg-thunderstorm','bg-snow','bg-mist');
    });
}

/* Events */
btn.addEventListener('click', () => {
  getWeatherByCity(input.value.trim());
});

input.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') getWeatherByCity(input.value.trim());
});

/* OPTIONAL: If no API key, show a hint */
(function checkKey(){
  if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
    setError('No API key found — replace "YOUR_API_KEY_HERE" in the file with your OpenWeather API key.');
  }
})();
</script>
</body>
</html>
