<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>promise</h1>


    <script>
        let newpromise = new Promise((resolve, reject) => {
            var url = false;

            setTimeout(() => {

                if (url == true) {
                    resolve("hey you are resolve");
                }
                else {
                    reject("hey you rae reject")
                }
            }, 5000);





        })
        newpromise.then((res) => {
            console.log(res);
        }).catch((err) => {
            console.log(err)
        })
    </script>




</body>

</html>
