 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
</head>
<body>
  <h1>Simple Calculator</h1>
  <input type="number" id="num1" placeholder="Number 1">
  <input type="number" id="num2" placeholder="Number 2"><br><br>
  <button onclick="window.print()">Add</button>
  <button onclick="calculate('add')">Add</button>
  <button onclick="calculate('sub')">Subtract</button>
  <button onclick="calculate('mul')">Multiply</button>
  <button onclick="calculate('div')">Divide</button>

  <h2 id="result">Result: </h2>

  <script>
    function calculate(op) {
      const n1 = parseFloat(document.getElementById("num1").value);
      const n2 = parseFloat(document.getElementById("num2").value);
      let res;

      switch(op) {
        case 'add': res = n1 + n2; break;
        case 'sub': res = n1 - n2; break;
        case 'mul': res = n1 * n2; break;
        case 'div': res = n2 !== 0 ? n1 / n2 : "Cannot divide by 0"; break;
      }

      document.getElementById("result").innerText = "Result: " + res;
    }
  </script>
</body>
</html>
