 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>
  <form action="home.html" onsubmit="loginuser()">
    <label>Username</label>
    <input type="text" id="loginname" placeholder="Enter your username" required><br><br>

    <label>Password</label>
    <input type="password" id="loginpassword" placeholder="Enter your password" required><br><br>

    <input type="submit">
  </form>

  <script src="auth.js"></script>
</body>
</html>
