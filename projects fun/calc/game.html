 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dino Runner Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #222;
      border: 3px solid #fff;
    }
  </style>
</head>
<body>
  <canvas id="game" width="600" height="200"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const pen = canvas.getContext("2d");

    // Dino
    let dino = { x: 50, y: 150, w: 30, h: 30, dy: 0, jump: false };

    // Cactus
    let cactus = { x: 600, y: 150, w: 20, h: 30 };

    // Gravity
    const gravity = 0.6;

    // Score
    let score = 0;

    // Key control
    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !dino.jump) {
        dino.dy = -12;
        dino.jump = true;
      }
    });

    function drawDino() {
      pen.fillStyle = "lime";
      pen.fillRect(dino.x, dino.y, dino.w, dino.h);
    }

    function drawCactus() {
      pen.fillStyle = "red";
      pen.fillRect(cactus.x, cactus.y, cactus.w, cactus.h);
    }

    function drawScore() {
      pen.fillStyle = "white";
      pen.font = "16px Arial";
      pen.fillText("Score: " + score, 10, 20);
    }

    function update() {
      // Clear screen
      pen.clearRect(0, 0, canvas.width, canvas.height);

      // Dino physics
      dino.y += dino.dy;
      dino.dy += gravity;

      if (dino.y >= 150) {
        dino.y = 150;
        dino.dy = 0;
        dino.jump = false;
      }

      // Cactus move
      cactus.x -= 5;
      if (cactus.x + cactus.w < 0) {
        cactus.x = 600;
        score++;
      }

      // Collision
      if (
        dino.x < cactus.x + cactus.w &&
        dino.x + dino.w > cactus.x &&
        dino.y < cactus.y + cactus.h &&
        dino.y + dino.h > cactus.y
      ) {
        alert("💀 GAME OVER! Score: " + score);
        document.location.reload();
      }

      // Draw
      drawDino();
      drawCactus();
      drawScore();

      requestAnimationFrame(update);
    }

    update();
  </script>
</body>
</html>
